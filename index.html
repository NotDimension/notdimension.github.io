    <!-- Script to update title dynamically for HashRouter -->
    <script>
      function updateTitle() {
        const page = window.location.hash.replace("#/", "");
        const titles = {
          "": "Portfolio",
          "projects": "Projects",
          "contact": "Contact",
          "about": "About Me"
        };
        document.title = "NotDimension | " + (titles[page] || "Portfolio");
      }

      window.addEventListener("hashchange", updateTitle);
      window.addEventListener("load", updateTitle);
    </script>
